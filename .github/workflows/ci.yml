name: ODIN CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.81"

jobs:
  # ---------------------------------------------------------------------------
  # Rust Backend - Lint & Format
  # ---------------------------------------------------------------------------
  rust-lint:
    name: Rust Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy lints
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ---------------------------------------------------------------------------
  # Rust Backend - Build
  # ---------------------------------------------------------------------------
  rust-build:
    name: Rust Build
    runs-on: ubuntu-latest
    needs: rust-lint
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace
        run: cargo build --workspace --release

  # ---------------------------------------------------------------------------
  # Rust Backend - Test
  # ---------------------------------------------------------------------------
  rust-test:
    name: Rust Test
    runs-on: ubuntu-latest
    needs: rust-lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: odin_test
          POSTGRES_USER: odin
          POSTGRES_PASSWORD: odin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U odin -d odin_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://odin:odin@localhost:5432/odin_test
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --workspace --all-targets

  # ---------------------------------------------------------------------------
  # Frontend - Lint & Build
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
      - name: Build
        run: npm run build
        env:
          API_URL: http://localhost:3001

  # ---------------------------------------------------------------------------
  # Docker Build
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [rust-build, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: odin-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: apps/web
          file: apps/web/Dockerfile
          push: false
          tags: odin-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Security Audit
  # ---------------------------------------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run cargo audit
        run: cargo audit

  # ---------------------------------------------------------------------------
  # Integration Test (Full Stack)
  # ---------------------------------------------------------------------------
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [rust-test, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Copy env file
        run: cp .env.example .env
      - name: Start services
        run: docker compose up -d --build --wait
        timeout-minutes: 10
      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3001/api/v1/system/health > /dev/null 2>&1; then
              echo "API is healthy"
              break
            fi
            echo "Waiting for API... ($i/60)"
            sleep 5
          done
      - name: Run smoke tests
        run: bash deploy/scripts/smoke-test.sh http://localhost
      - name: Show logs on failure
        if: failure()
        run: docker compose logs --tail=100
      - name: Tear down
        if: always()
        run: docker compose down -v
