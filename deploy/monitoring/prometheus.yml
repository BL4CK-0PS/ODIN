global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "odin-api"
    static_configs:
      - targets: ["odin-api:3001"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["postgres-exporter:9187"]
    scrape_interval: 30s

  - job_name: "redis-exporter"
    static_configs:
      - targets: ["redis-exporter:9121"]
    scrape_interval: 30s
